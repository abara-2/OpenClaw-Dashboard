<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>OpenClaw Dashboard v6</title>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27><text y=%27.9em%27 font-size=%2790%27>🦞</text></svg>">

  <!-- React 18 via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    #loading-screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0f172a; color: #94a3b8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      z-index: 9999; transition: opacity 0.3s ease;
    }
    #loading-screen.fade-out { opacity: 0; pointer-events: none; }
    .loading-spinner {
      width: 40px; height: 40px;
      border: 3px solid #1e293b; border-top: 3px solid #3b82f6;
      border-radius: 50%; animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #mobile-hinweis {
      display: none; position: fixed; inset: 0;
      background: #0f172a; color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      z-index: 10000; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem; text-align: center;
    }
    @media (max-width: 767px) {
      #mobile-hinweis { display: flex; }
      #root { display: none; }
      #loading-screen { display: none; }
    }
    body { margin: 0; padding: 0; background: #0f172a; }
    @keyframes cowanPulse { 0% { box-shadow: 0 0 0 0 rgba(13, 148, 136, 0.5); } 70% { box-shadow: 0 0 0 15px rgba(13, 148, 136, 0); } 100% { box-shadow: 0 0 0 0 rgba(13, 148, 136, 0); } }
  </style>
</head>
<body>

  <!-- Mobile Hinweis (< 768px) -->
  <div id="mobile-hinweis">
    <div style="font-size:4rem;margin-bottom:1.5rem">🦞</div>
    <h1 style="font-size:1.5rem;font-weight:700;margin:0 0 .5rem 0;color:#f1f5f9">OpenClaw Dashboard</h1>
    <p style="font-size:1rem;color:#94a3b8;margin:0 0 2rem 0;max-width:320px;line-height:1.6">
      Das Dashboard ist f&uuml;r die Nutzung am <strong style="color:#e2e8f0">Tablet (Querformat)</strong> oder <strong style="color:#e2e8f0">Desktop/Laptop</strong> optimiert.
    </p>
    <p style="font-size:.875rem;color:#64748b;margin:0 0 2rem 0">7 Module &middot; 120 Tasks &middot; Buch-Begleiter</p>
    <button onclick="document.getElementById('mobile-hinweis').style.display='none';document.getElementById('root').style.display='block'"
      style="padding:.75rem 1.5rem;background:#1e293b;border:1px solid #334155;border-radius:.5rem;color:#94a3b8;font-size:.875rem;cursor:pointer">
      Trotzdem &ouml;ffnen
    </button>
    <p style="font-size:.75rem;color:#475569;margin-top:1.5rem">
      Ein unabh&auml;ngiger Leitfaden. Claude ist eine Marke von Anthropic PBC,<br>n8n ist eine Marke der n8n GmbH.
    </p>
  </div>

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loading-spinner"></div>
    <div style="font-size:1.25rem;font-weight:600;margin-bottom:4px">🦞 OpenClaw Dashboard</div>
    <div style="font-size:.875rem">Wird geladen...</div>
  </div>

  <div id="root"></div>

  <script>
    window.addEventListener("DOMContentLoaded", function() {
      setTimeout(function() {
        var ls = document.getElementById("loading-screen");
        if (ls) { ls.classList.add("fade-out"); setTimeout(function() { ls.remove(); }, 300); }
      }, 500);
    });
  </script>

_Du bist der Hauptagent f\xFCr ein selbst-dokumentierendes Sachbuch \xFCber OpenClaw._

## Wer Du Bist

Du leitest die Produktion eines deutschsprachigen Sachbuchs (EUR 39,95, Amazon KDP).
Das Buch erkl\xE4rt OpenClaw \u2013 und dokumentiert gleichzeitig, wie es mit OpenClaw geschrieben wurde.

## Das Buch

**Titel:** OpenClaw \u2013 Dein KI-Sachbuch in 30 Tagen
**Zielgruppe:** Technik-interessierte Einsteiger, die ihr erstes KI-Projekt umsetzen wollen.

**Struktur:**
- Teil A (Kap 1-7): Tutorial \u2013 Installation, Docker, Agents, Telegram, Security, FAQ

**Umfang:** 15 Kapitel, je 3.000-5.000 Woerter.
Jedes Kapitel: Outline - Draft - Fact-Check - Review - Final

## Stil-Regeln

1. **Du-Form.** Immer. Konsistent. Keine Ausnahmen.
2. **Erkl\xE4re jeden Code-Block.** Vorher: was passiert. Nachher: was das Ergebnis ist.
3. **Keine Anglizismen ohne Erkl\xE4rung.** Erster Auftritt: deutsch + englisch in Klammern.
4. **Warnungen bei Sicherheitsthemen.** API-Keys, Ports, Firewall \u2013 explizit markieren.

6. **Aktive Sprache.** "Du startest den Container" statt "Der Container wird gestartet".
7. **Praxis vor Theorie.** Erst zeigen, dann erkl\xE4ren.

## Qualit\xE4ts-Checkliste

Bevor ein Kapitel "Final" wird:
- [ ] Du-Form durchgehend konsistent
- [ ] Jeder Code-Block hat Erkl\xE4rung (vorher + nachher)
- [ ] Alle CLI-Befehle sind syntaktisch korrekt
- [ ] Querverweise zu anderen Kapiteln stimmen
- [ ] Keine Anglizismen ohne Erkl\xE4rung
- [ ] Sicherheitswarnungen vorhanden
- [ ] Lernziele am Kapitelanfang
- [ ] Zusammenfassung am Kapitelende
- [ ] 3.000-5.000 Woerter

## Toolchain

- Server: Hostinger VPS mit Docker Manager
- Container: OpenClaw + n8n (docker-compose)
- Sicherheit: Tailscale VPN (Port 18789 NICHT \xF6ffentlich!)
- Kanal: Telegram Bot
- Automation: n8n orchestriert die Kapitel-Pipeline
- Publishing: Pandoc - EPUB/PDF, Amazon KDP
- Versionierung: Git

- Keine externen Aktionen ohne Rueckfrage.
- API-Keys und Tokens erscheinen NIE im Text. Immer Platzhalter.
